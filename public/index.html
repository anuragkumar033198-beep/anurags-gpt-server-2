<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Anurag's GPT</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="theme-color" content="#3b82f6">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 950: '#0d1117' }, primary: { 500: '#3b82f6', 600: '#2563eb' } }, animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' } } } }
    </script>
    <style>
        html, body { height: 100%; height: 100dvh; width: 100%; overflow: hidden; overscroll-behavior-y: none; }
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: #0d1117; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .prose-content pre { background-color: #1f2937; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem; font-family: monospace; border: 1px solid #374151; } .prose-content code { background-color: #374151; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; } .prose-content pre code { background-color: transparent; padding: 0; border: none; color: #e5e7eb; } .prose-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; } .typing-dot:nth-child(1) { animation-delay: -0.32s; } .typing-dot:nth-child(2) { animation-delay: -0.16s; } @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } } .fade-in { animation: fadeIn 0.3s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans flex overflow-hidden selection:bg-primary-500 selection:text-white relative w-full h-[100dvh]">

    <div id="password-overlay" class="fixed inset-0 bg-gray-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center transform transition-all">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-900/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Private Access</h2>
            <p class="text-gray-400 text-sm mb-6">Enter the password to access Anurag's GPT.</p>
            <input type="password" id="app-password-input" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white mb-4 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-center transition-colors" placeholder="Enter Password">
            <button id="submit-password-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all shadow-md active:scale-95">Unlock App</button>
            <p id="password-error" class="text-red-400 text-sm mt-4 hidden fade-in font-medium">Incorrect password. Please try again.</p>
        </div>
    </div>

    <aside id="sidebar" class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-40 h-full">
        <div class="p-4"><button id="new-chat-btn" class="w-full flex items-center gap-3 bg-gray-800 hover:bg-gray-700 text-gray-200 py-3 px-4 rounded-full transition-all duration-200 border border-gray-700 shadow-sm"><span class="font-medium text-sm">New Chat</span></button></div>
        <div class="flex-1 overflow-y-auto px-2 pb-2" id="chat-history-list"></div>
        <div class="p-4 border-t border-gray-800 bg-gray-900"><button id="open-settings-btn" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 w-full p-2 rounded-lg transition-colors"><span class="text-sm">Settings</span></button></div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden glass"></div>

    <main class="flex-1 flex flex-col h-full relative w-full bg-gray-950">
        <header class="h-14 border-b border-gray-800 flex items-center justify-between px-4 bg-gray-950 z-10 shrink-0">
            <div class="flex items-center gap-3"><button id="mobile-menu-btn" class="md:hidden text-gray-400 hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button><span class="text-lg font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Anurag's GPT</span></div>
            <button id="clear-chat-btn" class="text-gray-400 hover:text-red-400 text-sm flex items-center gap-1 transition-colors"><span class="hidden sm:inline">Clear Chat</span></button>
        </header>

        <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth relative">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-6 text-gray-400">
                <div class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center mb-2 shadow-lg shadow-blue-900/20"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg></div>
                <div><h2 class="text-2xl font-bold text-gray-200 mb-2">How can I help you today?</h2><p class="text-sm max-w-md mx-auto text-gray-500">Connected securely to your backend server.</p></div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full max-w-2xl px-4 mt-6">
                    <button class="suggestion-btn bg-gray-900 border border-gray-800 p-4 rounded-xl hover:bg-gray-800 hover:border-gray-600 text-left text-sm transition-all shadow-sm">"Explain quantum computing in simple terms"</button>
                    <button class="suggestion-btn bg-gray-900 border border-gray-800 p-4 rounded-xl hover:bg-gray-800 hover:border-gray-600 text-left text-sm transition-all shadow-sm">"Write a Python script to scrape a website"</button>
                    <button class="suggestion-btn bg-gray-900 border border-gray-800 p-4 rounded-xl hover:bg-gray-800 hover:border-gray-600 text-left text-sm transition-all shadow-sm">"Debug this React component code..."</button>
                    <button class="suggestion-btn bg-gray-900 border border-gray-800 p-4 rounded-xl hover:bg-gray-800 hover:border-gray-600 text-left text-sm transition-all shadow-sm">"Draft a professional email to a client"</button>
                </div>
            </div>
        </div>

        <button id="scroll-to-bottom-btn" class="absolute bottom-28 right-6 md:right-10 bg-gray-800/90 backdrop-blur-md border border-gray-600 text-gray-300 hover:text-white hover:bg-gray-700 p-2.5 rounded-full shadow-2xl transition-all duration-300 z-50 opacity-0 pointer-events-none translate-y-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3" />
            </svg>
        </button>

        <div class="p-4 md:p-6 pb-safe bg-gradient-to-t from-gray-950 via-gray-950 to-transparent shrink-0 z-10">
            <div class="max-w-3xl mx-auto relative">
                <div class="relative bg-gray-900 rounded-3xl border border-gray-700 shadow-xl focus-within:border-gray-500 focus-within:ring-1 focus-within:ring-gray-500 transition-all duration-300">
                    
                    <div id="attachment-preview-container" class="hidden px-5 pt-4 pb-1">
                        <div class="relative inline-block group">
                            <img id="image-preview" class="h-16 w-16 object-cover rounded-xl border border-gray-600 shadow-md hidden">
                            <div id="file-preview" class="h-16 flex items-center gap-3 bg-gray-800 border border-gray-600 rounded-xl px-4 shadow-md hidden max-w-[200px]">
                                <svg class="w-6 h-6 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                <div class="flex flex-col overflow-hidden">
                                    <span id="file-preview-name" class="text-xs font-medium text-gray-200 truncate"></span>
                                    <span id="file-preview-status" class="text-[10px] text-gray-400">Extracted</span>
                                </div>
                            </div>
                            <button id="remove-attachment-btn" class="absolute -top-2 -right-2 bg-gray-700 hover:bg-red-500 text-white rounded-full p-1.5 shadow-md transition-colors z-10 border border-gray-600">
                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="relative flex items-end w-full">
                        <div id="attachment-wrapper" class="absolute left-2 bottom-2 z-20 transition-opacity duration-200">
                            <div id="attachment-menu" class="absolute bottom-12 left-0 w-44 bg-gray-800 border border-gray-700 rounded-xl shadow-lg hidden flex-col overflow-hidden">
                                <button id="menu-file-btn" class="text-left px-4 py-3 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors flex items-center gap-2 border-b border-gray-700">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> Upload a document
                                </button>
                                <button id="menu-photo-btn" class="text-left px-4 py-3 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> Upload a photo
                                </button>
                            </div>
                            <button id="upload-btn" class="p-2 text-gray-400 hover:text-white transition-colors rounded-full hover:bg-gray-800" title="Attach">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                            </button>
                        </div>
                        
                        <input type="file" id="general-file-input" accept=".txt,.pdf,.md,.csv,.js,.py,.html,.css,.json" class="hidden">
                        <input type="file" id="file-input" accept="image/*" class="hidden">
                        
                        <textarea id="user-input" rows="1" class="w-full bg-transparent text-gray-100 placeholder-gray-500 pl-14 py-4 pr-14 rounded-3xl outline-none resize-none max-h-48 overflow-y-auto leading-relaxed" placeholder="Message Anurag's GPT..."></textarea>
                        
                        <button id="send-btn" class="absolute right-2 bottom-2 p-2 bg-white text-gray-900 rounded-full hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center justify-center h-9 w-9" disabled><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-100 flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900 shrink-0"><h3 class="text-lg font-semibold text-white flex items-center gap-2">Settings</h3><button id="close-settings-btn" class="text-gray-500 hover:text-white transition-colors bg-gray-800 hover:bg-gray-700 p-1.5 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button></div>
            <div class="p-6 space-y-5 overflow-y-auto">
                <label class="block text-sm font-semibold text-gray-300 mb-1.5 flex justify-between items-center">
                    System Prompt Override
                    <span class="text-[10px] font-normal bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full uppercase tracking-wider">Optional</span>
                </label>
                <textarea id="system-prompt-input" rows="4" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors shadow-inner resize-none leading-relaxed" placeholder="e.g., You are a senior web developer. Always provide clean code and explain your logic simply..."></textarea>
            </div>
            <div class="p-5 border-t border-gray-800 bg-gray-900 shrink-0 flex justify-between items-center">
                <button id="lock-app-btn" class="bg-red-900/30 border border-red-900/50 hover:bg-red-600 hover:border-red-500 text-red-400 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">Lock App</button>
                <button id="save-settings-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-all shadow-lg hover:shadow-blue-500/20 active:scale-95">Save Preferences</button>
            </div>
        </div>
    </div>

    <script>
        // Setup PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const APP_STORAGE_KEY = 'ai_chat_app_data_v13';
        const SETTINGS_STORAGE_KEY = 'ai_chat_app_settings_v13';
        const PWD_STORAGE_KEY = 'ai_chat_auth_pwd'; 

        let state = { chats: [], currentChatId: null };
        let settings = { systemPrompt: '' };
        let currentPassword = localStorage.getItem(PWD_STORAGE_KEY) || '';
        
        let currentBase64Image = null; 
        let currentFileAttachment = null; 

        let isGenerating = false;
        let abortController = null;
        let isUserScrolledUp = false;

        const SEND_ICON = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>`;
        const STOP_ICON = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2" ry="2"></rect></svg>`;
        const CLIPBOARD_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" /></svg>`;
        const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-green-400"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;

        const $ = (selector) => document.querySelector(selector);
        const $$ = (selector) => document.querySelectorAll(selector);
        
        const elPassOverlay = $('#password-overlay');
        const elPassInput = $('#app-password-input');
        const elPassSubmit = $('#submit-password-btn');
        const elPassError = $('#password-error');
        const elUserInput = $('#user-input');
        const elSendBtn = $('#send-btn');
        const elMessagesContainer = $('#messages-container');
        const elWelcomeScreen = $('#welcome-screen');
        const elAttachmentMenu = $('#attachment-menu');
        const elAttachmentWrapper = $('#attachment-wrapper');
        const elAttachmentPreviewContainer = $('#attachment-preview-container');
        const elScrollToBottomBtn = $('#scroll-to-bottom-btn');

        // SCROLL TRACKING LOGIC
        elMessagesContainer.addEventListener('scroll', () => {
            const distanceToBottom = elMessagesContainer.scrollHeight - elMessagesContainer.scrollTop - elMessagesContainer.clientHeight;
            isUserScrolledUp = distanceToBottom > 80; 
            
            if (isUserScrolledUp) {
                elScrollToBottomBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                elScrollToBottomBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                elScrollToBottomBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                elScrollToBottomBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        elScrollToBottomBtn.addEventListener('click', () => {
            isUserScrolledUp = false;
            elMessagesContainer.scrollTo({ top: elMessagesContainer.scrollHeight, behavior: 'smooth' });
        });

        function scrollToBottom() { 
            if (!isUserScrolledUp) {
                elMessagesContainer.scrollTop = elMessagesContainer.scrollHeight; 
            }
        }

        // SECURITY LOCKDOWN UI
        function triggerLockdownUI() {
            elPassOverlay.classList.remove('hidden');
            elPassInput.classList.add('hidden');
            elPassSubmit.classList.add('hidden');
            elPassError.classList.remove('hidden', 'text-red-400');
            elPassError.classList.add('text-red-500', 'font-bold', 'text-lg', 'mt-0');
            elPassError.innerHTML = "🚨 IP BANNED 🚨<br><span class='text-sm text-gray-400 font-normal mt-2 block'>Too many failed attempts. Your IP has been logged and blocked by the server.</span>";
        }

        // PASSWORD VERIFICATION
        async function verifyPassword(pwd, isSilent = false) {
            if (!isSilent) { elPassSubmit.innerText = 'Verifying...'; elPassSubmit.disabled = true; }
            try {
                const res = await fetch('/api/verify', { method: 'POST', headers: { 'x-app-password': pwd } });
                if (res.ok) {
                    currentPassword = pwd; localStorage.setItem(PWD_STORAGE_KEY, pwd);
                    elPassOverlay.classList.add('hidden'); elPassError.classList.add('hidden');
                } else if (res.status === 403) { triggerLockdownUI(); } 
                else {
                    const data = await res.json();
                    if (isSilent) { currentPassword = ''; localStorage.removeItem(PWD_STORAGE_KEY); elPassOverlay.classList.remove('hidden'); } 
                    else { elPassError.innerText = `Incorrect password. ${data.attemptsLeft} attempts remaining.`; elPassError.classList.remove('hidden'); elPassInput.value = ''; elPassInput.focus(); }
                }
            } catch (err) { if (!isSilent) { elPassError.innerText = "Network error connecting to server."; elPassError.classList.remove('hidden'); } } 
            finally { if (!isSilent) { elPassSubmit.innerText = 'Unlock App'; elPassSubmit.disabled = false; } }
        }

        if (currentPassword) { verifyPassword(currentPassword, true); } else { elPassOverlay.classList.remove('hidden'); }

        function unlockApp() { const pwd = elPassInput.value.trim(); if (pwd) verifyPassword(pwd); }
        elPassSubmit.addEventListener('click', unlockApp);
        elPassInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlockApp(); });

        // ATTACHMENTS MENU
        $('#upload-btn').addEventListener('click', (e) => {
            e.stopPropagation(); elAttachmentMenu.classList.toggle('hidden'); elAttachmentMenu.classList.toggle('flex');
        });
        document.addEventListener('click', (e) => {
            if (!elAttachmentMenu.contains(e.target) && e.target !== $('#upload-btn')) {
                elAttachmentMenu.classList.add('hidden'); elAttachmentMenu.classList.remove('flex');
            }
        });
        $('#menu-photo-btn').addEventListener('click', () => {
            $('#file-input').click(); elAttachmentMenu.classList.add('hidden'); elAttachmentMenu.classList.remove('flex');
        });
        $('#menu-file-btn').addEventListener('click', () => {
            $('#general-file-input').click(); elAttachmentMenu.classList.add('hidden'); elAttachmentMenu.classList.remove('flex');
        });

        // IMAGE HANDLER
        $('#file-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            resetAttachments();
            const reader = new FileReader();
            reader.onload = (event) => {
                currentBase64Image = event.target.result;
                $('#image-preview').src = currentBase64Image;
                $('#image-preview').classList.remove('hidden');
                $('#file-preview').classList.add('hidden');
                elAttachmentPreviewContainer.classList.remove('hidden');
                if (!isGenerating) elSendBtn.disabled = false; 
            };
            reader.readAsDataURL(file);
        });

        // DOCUMENT HANDLER
        $('#general-file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            resetAttachments();
            
            $('#file-preview-name').innerText = file.name;
            $('#file-preview-status').innerText = "Extracting...";
            $('#file-preview-status').classList.replace('text-gray-400', 'text-yellow-400');
            $('#file-preview').classList.remove('hidden');
            $('#image-preview').classList.add('hidden');
            elAttachmentPreviewContainer.classList.remove('hidden');

            try {
                let extractedText = "";
                if (file.type === 'application/pdf') { extractedText = await extractPdfText(file); } 
                else { extractedText = await extractTextFile(file); }
                
                if (extractedText.trim() !== "") {
                    currentFileAttachment = { name: file.name, text: extractedText };
                    $('#file-preview-status').innerText = "Attached";
                    $('#file-preview-status').classList.replace('text-yellow-400', 'text-green-400');
                    if (!isGenerating) elSendBtn.disabled = false;
                } else { throw new Error("File is empty."); }
            } catch (error) {
                alert("Could not read file. Please ensure it is a valid document or PDF.");
                resetAttachments();
            }
        });

        async function extractTextFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsText(file);
            });
        }
        async function extractPdfText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + "\n";
            }
            return text;
        }

        $('#remove-attachment-btn').addEventListener('click', resetAttachments);
        function resetAttachments() {
            currentBase64Image = null; currentFileAttachment = null;
            $('#file-input').value = ''; $('#general-file-input').value = '';
            elAttachmentPreviewContainer.classList.add('hidden');
            $('#file-preview-status').classList.remove('text-green-400', 'text-yellow-400');
            $('#file-preview-status').classList.add('text-gray-400');
            if (elUserInput.value.trim() === '' && !isGenerating) elSendBtn.disabled = true;
        }

        // CORE APP LOGIC
        function init() { loadSettings(); loadChats(); renderSidebar(); if (state.chats.length > 0) loadChat(state.chats[0].id); else showWelcome(); }
        function saveChats() { localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(state.chats)); }
        function loadChats() { const stored = localStorage.getItem(APP_STORAGE_KEY); if (stored) state.chats = JSON.parse(stored); }
        function saveSettings() { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings)); }
        function loadSettings() {
            const stored = localStorage.getItem(SETTINGS_STORAGE_KEY);
            if (stored) settings = { ...settings, ...JSON.parse(stored) };
            $('#system-prompt-input').value = settings.systemPrompt || '';
        }

        function getOrCreateChat(firstMessage) {
            if (state.currentChatId) return state.chats.find(c => c.id === state.currentChatId);
            const title = firstMessage ? (firstMessage.substring(0, 30) + (firstMessage.length > 30 ? '...' : '')) : "New Chat";
            const newChat = { id: Date.now().toString(), title: title, messages: [] };
            state.chats.unshift(newChat); state.currentChatId = newChat.id; saveChats(); renderSidebar(); return newChat;
        }

        function clearMessages() { Array.from(elMessagesContainer.children).forEach(child => { if (child.id !== 'welcome-screen' && child.id !== 'scroll-to-bottom-btn') child.remove(); }); }
        function showWelcome() { clearMessages(); elWelcomeScreen.classList.remove('hidden'); }
        
        function loadChat(id) { 
            state.currentChatId = id; 
            const chat = state.chats.find(c => c.id === id); 
            clearMessages();
            if (chat && chat.messages.length > 0) { 
                elWelcomeScreen.classList.add('hidden');
                chat.messages.forEach(msg => appendMessageToDOM(msg.role, msg.content)); 
                scrollToBottom(); 
            } else { elWelcomeScreen.classList.remove('hidden'); }
            if (window.innerWidth < 768) { 
                $('#sidebar').classList.add('-translate-x-full'); 
                $('#sidebar-overlay').classList.add('hidden'); 
                elAttachmentWrapper.classList.remove('opacity-0', 'pointer-events-none');
            }
        }
        
        function renderSidebar() { 
            $('#chat-history-list').innerHTML = '<div class="px-4 py-3 text-[11px] font-bold text-gray-500 uppercase tracking-widest">Recent Chats</div>';
            state.chats.forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between px-3 py-2.5 mx-2 rounded-xl cursor-pointer text-sm transition-all mb-1 ${isActive ? 'bg-gray-800/80 text-white shadow-sm' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<div class="flex items-center gap-3 overflow-hidden"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0 ${isActive ? 'text-blue-400' : 'text-gray-500'}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg><span class="truncate font-medium">${escapeHtml(chat.title)}</span></div><button class="opacity-0 group-hover:opacity-100 hover:text-red-400 hover:bg-red-400/10 p-1.5 rounded-lg transition-all" onclick="deleteChat(event, '${chat.id}')"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>`;
                $('#chat-history-list').appendChild(div);
            });
        }

        function deleteChat(e, id) { e.stopPropagation(); if(!confirm('Delete this chat?')) return; state.chats = state.chats.filter(c => c.id !== id); saveChats(); renderSidebar(); if (state.currentChatId === id) { state.currentChatId = null; showWelcome(); } }
        function escapeHtml(text) { const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return text.replace(/[&<>"']/g, m => map[m]); }
        
        // MARKDOWN PARSER
        function formatText(text) { 
            let safeText = escapeHtml(text);

            safeText = safeText.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return `<div class="relative group/code mb-4 mt-2 bg-[#0d1117] rounded-xl border border-gray-700 overflow-hidden shadow-sm">
                            <div class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-700">
                                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">${lang || 'code'}</span>
                                <button onclick="copyCodeBlock(this)" class="text-gray-400 hover:text-white flex items-center gap-1.5 text-xs font-medium transition-colors p-1" title="Copy Code">
                                    ${CLIPBOARD_ICON} <span>Copy Code</span>
                                </button>
                            </div>
                            <pre class="p-4 overflow-x-auto m-0 bg-[#0d1117]"><code class="text-sm font-mono text-gray-300 block raw-code-content">${code}</code></pre>
                        </div>`;
            });

            safeText = safeText.replace(/`([^`\n]+)`/g, '<code class="bg-gray-700 px-1.5 py-0.5 rounded text-pink-300 font-mono text-[0.9em]">$1</code>');
            safeText = safeText.replace(/\*\*([^*]+)\*\*/g, '<strong class="text-white">$1</strong>');
            
            let parts = safeText.split(/(<div class="relative group\/code[\s\S]*?<\/div>)/g);
            return parts.map(part => {
                if (part.startsWith('<div class="relative group/code')) return part;
                return part.replace(/\n/g, '<br>');
            }).join('');
        }
        
        function appendMessageToDOM(role, content) {
            if(role === 'system') return;
            
            let displayContent = "";
            let imageHtml = "";

            if (Array.isArray(content)) {
                let textObj = content.find(c => c.type === 'text');
                displayContent = textObj ? textObj.text : "";
                let imgObj = content.find(c => c.type === 'image_url');
                if (imgObj) imageHtml = `<img src="${imgObj.image_url.url}" class="max-w-[200px] rounded-xl mb-3 border border-gray-700 shadow-md">`;
            } else { displayContent = content; }

            if (role === 'user' && displayContent.startsWith('[STRICT SYSTEM INSTRUCTIONS:')) { 
                const parts = displayContent.split('\n\nUser Message: '); 
                if (parts.length > 1) displayContent = parts.slice(1).join('\n\nUser Message: '); 
            }
            if (role === 'user' && displayContent.includes('--- FILE CONTENT ---')) {
                displayContent = displayContent.split('--- END FILE CONTENT ---\n\n')[1] || displayContent;
                imageHtml = `<div class="flex items-center gap-2 mb-3 bg-gray-700 px-3 py-2 rounded-lg text-sm font-medium text-gray-200 border border-gray-600 w-fit"><svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> Document Attached</div>`;
            }

            const isUser = role === 'user'; 
            const div = document.createElement('div'); 
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} fade-in mb-2`;
            
            const copyBtnHtml = !isUser ? 
                `<button onclick="copyToClipboard(this)" data-content="${escapeHtml(displayContent)}" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity bg-gray-700 hover:bg-gray-600 text-gray-300 p-1.5 rounded-lg text-xs font-medium shadow-sm flex items-center justify-center z-10 border border-gray-600" title="Copy Full Message">${CLIPBOARD_ICON}</button>` : '';

            const bubbleStyles = isUser ? 'bg-gray-800 text-white rounded-2xl rounded-tr-sm px-5 py-3 shadow-sm' : 'text-gray-200 px-5 py-4 bg-gray-900 border border-gray-800 rounded-2xl rounded-tl-sm w-full relative pr-14 min-w-[120px] shadow-sm'; 

            div.innerHTML = `
            <div class="max-w-[85%] md:max-w-[80%] flex gap-3 ${isUser ? 'flex-row-reverse' : 'flex-row'} group">
                <div class="flex-shrink-0 h-8 w-8 rounded-full flex items-center justify-center shadow-sm ${isUser ? 'bg-gray-700' : 'bg-gradient-to-br from-blue-500 to-purple-600'}">
                    ${isUser ? '<svg class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>' : '<svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>'}
                </div>
                <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'} w-full">
                    <div class="prose-content ${bubbleStyles}">
                        ${copyBtnHtml} ${imageHtml}
                        <div class="message-text w-full">${isUser ? escapeHtml(displayContent) : formatText(displayContent)}</div>
                    </div>
                </div>
            </div>`;
            elMessagesContainer.appendChild(div);
        }

        function createLoadingIndicator() { 
            const div = document.createElement('div'); 
            div.id = 'loading-indicator'; 
            div.className = 'flex w-full justify-start fade-in mb-2'; 
            div.innerHTML = `<div class="max-w-[85%] flex gap-3"><div class="flex-shrink-0 h-8 w-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center animate-pulse-slow"><svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg></div><div class="flex items-center gap-1.5 h-8 px-4 bg-gray-900 rounded-2xl rounded-tl-sm border border-gray-800 shadow-sm"><div class="w-1.5 h-1.5 bg-blue-500 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-pink-500 rounded-full typing-dot"></div></div></div>`; 
            elMessagesContainer.appendChild(div); 
            scrollToBottom(); 
        }
        
        function removeLoadingIndicator() { const ind = document.getElementById('loading-indicator'); if (ind) ind.remove(); }

        // CORE CHAT SUBMISSION (Upgraded with The First Token Lock)
        async function sendMessage() {
            if (isGenerating) { if (abortController) abortController.abort(); return; }

            const text = elUserInput.value.trim();
            if (!text && !currentBase64Image && !currentFileAttachment) return;

            isGenerating = true; abortController = new AbortController();
            
            elUserInput.value = ''; elUserInput.style.height = 'auto'; elUserInput.disabled = true; elUserInput.placeholder = "Anurag's GPT is typing...";
            elSendBtn.innerHTML = STOP_ICON; elSendBtn.disabled = false; elWelcomeScreen.classList.add('hidden');

            const chat = getOrCreateChat(text || "Document Analysis"); 
            
            let messageContent = text;
            if (currentBase64Image) {
                messageContent = [{ type: "text", text: text || "Analyze this image." }, { type: "image_url", image_url: { url: currentBase64Image } }];
            } else if (currentFileAttachment) {
                messageContent = `I have attached a file named "${currentFileAttachment.name}".\n\n--- FILE CONTENT ---\n${currentFileAttachment.text}\n--- END FILE CONTENT ---\n\n${text || "Please review the attached document and provide a brief summary of its contents."}`;
            }

            chat.messages.push({ role: 'user', content: messageContent }); saveChats(); 
            appendMessageToDOM('user', messageContent); 
            
            // 1. Instantly show the bouncing dots while OpenRouter hunts for a model
            createLoadingIndicator();
            resetAttachments();

            try {
                let payloadMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));

                if (settings.systemPrompt && settings.systemPrompt.trim() !== '') {
                    if (typeof payloadMessages[0].content === 'string') {
                        payloadMessages[0].content = `[STRICT SYSTEM INSTRUCTIONS: ${settings.systemPrompt.trim()}]\n\nUser Message: ${payloadMessages[0].content}`;
                    } else if (Array.isArray(payloadMessages[0].content)) {
                        let textObj = payloadMessages[0].content.find(c => c.type === 'text');
                        if (textObj) textObj.text = `[STRICT SYSTEM INSTRUCTIONS: ${settings.systemPrompt.trim()}]\n\nUser Message: ${textObj.text}`;
                    }
                }

                let response;
                let maxRetries = 3;
                let waitTime = 3000;

                for (let attempt = 1; attempt <= maxRetries; attempt++) {
                    response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "x-app-password": currentPassword },
                        body: JSON.stringify({ messages: payloadMessages }),
                        signal: abortController.signal
                    });

                    if (response.status === 401) { currentPassword = ''; localStorage.removeItem(PWD_STORAGE_KEY); elPassOverlay.classList.remove('hidden'); elPassError.classList.remove('hidden'); throw new Error("Incorrect Password."); }
                    if (response.status === 403) { triggerLockdownUI(); throw new Error("IP BANNED"); }

                    if ((response.status === 502 || response.status === 503 || response.status === 429) && attempt < maxRetries) {
                        elUserInput.placeholder = `Servers busy. Retrying in ${waitTime/1000}s... (Attempt ${attempt}/${maxRetries})`;
                        await new Promise(res => setTimeout(res, waitTime));
                        waitTime += 2000;
                        continue;
                    }

                    if (!response.ok) { 
                        const errData = await response.json().catch(() => ({})); 
                        throw new Error(errData.error || `API Error: ${response.status}`); 
                    }
                    
                    break;
                }

                // --- THE FIRST TOKEN LOCK LOGIC ---
                // We do NOT remove the loading indicator here!
                // We keep it spinning until the first token physically arrives.
                
                const reader = response.body.getReader(); 
                const decoder = new TextDecoder(); 
                let aiContent = ""; 
                let buffer = "";
                
                let isFirstToken = true;
                let textContainers = null;
                let lastTextContainer = null;
                let lastCopyBtn = null;

                while (true) {
                    const { done, value } = await reader.read(); 
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true }); 
                    let boundary = buffer.indexOf('\n\n');
                    
                    while (boundary !== -1) {
                        const message = buffer.substring(0, boundary); 
                        buffer = buffer.substring(boundary + 2);
                        
                        if (message.startsWith('data: ')) {
                            const dataStr = message.slice(6); 
                            if (dataStr === '[DONE]') break;
                            
                            try { 
                                const data = JSON.parse(dataStr); 
                                const deltaContent = data.choices[0]?.delta?.content || "";
                                
                                if (deltaContent) {
                                    aiContent += deltaContent; 
                                    
                                    // 2. The millisecond the first piece of text arrives:
                                    if (isFirstToken) {
                                        removeLoadingIndicator(); // Destroy the bouncing dots
                                        appendMessageToDOM('assistant', ''); // Create the dark-mode bubble
                                        
                                        textContainers = elMessagesContainer.querySelectorAll('.message-text'); 
                                        lastTextContainer = textContainers[textContainers.length - 1];
                                        lastCopyBtn = lastTextContainer.parentElement.querySelector('button[title="Copy Full Message"]');
                                        if(lastCopyBtn) lastCopyBtn.style.display = 'none'; // Hide copy button while typing
                                        
                                        isFirstToken = false; // The Lock is released!
                                    }
                                    
                                    // Render the text into the newly created bubble
                                    lastTextContainer.innerHTML = formatText(aiContent); 
                                    scrollToBottom(); 
                                }
                            } catch (e) {} 
                        }
                        boundary = buffer.indexOf('\n\n');
                    }
                }
                
                // Fallback: If OpenRouter sent a totally empty stream but didn't crash
                if (isFirstToken) {
                    removeLoadingIndicator();
                    appendMessageToDOM('assistant', '*(No text generated by AI)*');
                    textContainers = elMessagesContainer.querySelectorAll('.message-text'); 
                    lastTextContainer = textContainers[textContainers.length - 1];
                    lastCopyBtn = lastTextContainer.parentElement.querySelector('button[title="Copy Full Message"]');
                }

                chat.messages.push({ role: 'assistant', content: aiContent }); saveChats();
                
                // Show the copy button now that the stream is finished
                if(lastCopyBtn && aiContent.trim() !== "") { 
                    lastCopyBtn.style.display = 'flex'; 
                    lastCopyBtn.setAttribute('data-content', escapeHtml(aiContent)); 
                }

            } catch (error) {
                removeLoadingIndicator();
                if (error.name === 'AbortError') {
                    const textContainers = elMessagesContainer.querySelectorAll('.message-text');
                    const lastText = textContainers[textContainers.length - 1]?.innerText || "";
                    if (lastText) { chat.messages.push({ role: 'assistant', content: lastText }); saveChats(); }
                } else if (error.message !== "Incorrect Password." && error.message !== "IP BANNED") {
                    appendMessageToDOM('assistant', `\n\n⚠️ **${error.message}**\n*(Could not connect to AI after multiple attempts).*`);
                    
                    if (chat.messages.length > 0 && chat.messages[chat.messages.length - 1].role === 'user') {
                        chat.messages.pop(); 
                        saveChats();
                    }
                }
            } finally { 
                isGenerating = false; abortController = null; elSendBtn.innerHTML = SEND_ICON;
                elUserInput.disabled = false; elUserInput.placeholder = "Message Anurag's GPT...";
                elSendBtn.disabled = elUserInput.value.trim() === '' && !currentBase64Image && !currentFileAttachment; 
                elUserInput.focus(); 
            }
        }

        elSendBtn.addEventListener('click', sendMessage);
        elUserInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        elUserInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; if (!isGenerating) elSendBtn.disabled = this.value.trim() === '' && !currentBase64Image && !currentFileAttachment; });
        
        $('#clear-chat-btn').addEventListener('click', () => { if (!state.currentChatId || !confirm('Clear all messages?')) return; const chat = state.chats.find(c => c.id === state.currentChatId); if (chat) { chat.messages = []; saveChats(); loadChat(state.currentChatId); } });
        $('#new-chat-btn').addEventListener('click', () => { state.currentChatId = null; showWelcome(); });
        $('#open-settings-btn').addEventListener('click', () => $('#settings-modal').classList.remove('hidden'));
        $('#close-settings-btn').addEventListener('click', () => $('#settings-modal').classList.add('hidden'));

        $('#save-settings-btn').addEventListener('click', () => { settings.systemPrompt = $('#system-prompt-input').value.trim(); saveSettings(); $('#settings-modal').classList.add('hidden'); const originalText = $('#save-settings-btn').innerText; $('#save-settings-btn').innerText = 'Saved!'; $('#save-settings-btn').classList.replace('bg-blue-600', 'bg-green-600'); setTimeout(() => { $('#save-settings-btn').innerText = originalText; $('#save-settings-btn').classList.replace('bg-green-600', 'bg-blue-600'); }, 1000); });
        $('#lock-app-btn').addEventListener('click', () => { currentPassword = ''; localStorage.removeItem(PWD_STORAGE_KEY); $('#settings-modal').classList.add('hidden'); elPassInput.value = ''; elPassError.classList.add('hidden'); elPassOverlay.classList.remove('hidden'); });
        
        $('#mobile-menu-btn').addEventListener('click', () => { $('#sidebar').classList.remove('-translate-x-full'); $('#sidebar-overlay').classList.remove('hidden'); elAttachmentWrapper.classList.add('opacity-0', 'pointer-events-none'); });
        $('#sidebar-overlay').addEventListener('click', () => { $('#sidebar').classList.add('-translate-x-full'); $('#sidebar-overlay').classList.add('hidden'); elAttachmentWrapper.classList.remove('opacity-0', 'pointer-events-none'); });

        $$('.suggestion-btn').forEach(btn => { btn.addEventListener('click', () => { elUserInput.value = btn.innerText.replace(/"/g, '').trim(); elSendBtn.disabled = false; sendMessage(); }); });

        // PREMIUM COPY MESSAGE LOGIC
        window.copyToClipboard = (btn) => {
            const txt = document.createElement('textarea'); txt.innerHTML = btn.getAttribute('data-content');
            navigator.clipboard.writeText(txt.value).then(() => {
                const originalHTML = btn.innerHTML; 
                btn.innerHTML = CHECK_ICON;
                setTimeout(() => btn.innerHTML = originalHTML, 2000);
            });
        };

        // PREMIUM COPY CODE LOGIC
        window.copyCodeBlock = (btn) => {
            const preContainer = btn.closest('.relative').querySelector('.raw-code-content');
            const txt = document.createElement('textarea'); 
            let codeHtml = preContainer.innerHTML.replace(/<br\s*[\/]?>/gi, '\n');
            txt.innerHTML = codeHtml;
            
            navigator.clipboard.writeText(txt.value).then(() => {
                const originalHTML = btn.innerHTML; 
                btn.innerHTML = `${CHECK_ICON} <span>Copied!</span>`;
                btn.classList.replace('text-gray-400', 'text-green-400');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('text-green-400', 'text-gray-400');
                }, 2000);
            });
        };

        init();
    </script>
</body>
